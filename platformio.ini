; PlatformIO project configuration
; https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1   ; change to your exact board if different,
                               ; e.g. esp32dev, esp32-s3-devkitc-1, wemos_d1_mini32
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; Wire.h (I2C) is bundled with the Arduino-ESP32 core, no extra
; lib_deps needed for this project.

build_flags =
    -D CORE_DEBUG_LEVEL=0